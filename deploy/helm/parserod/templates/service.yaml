apiVersion: v1
kind: Service
metadata:
  name: {{ include "parserod.fullname" . }}
  labels:
    {{- include "parserod.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "parserod.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
